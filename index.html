<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChannelDeco 伽宜諾 · Threads 社群聆聽儀表板</title>
<style>
:root {
  --bg:#f7f5f1; --card:#ffffff; --border:#e5e1d8;
  --text:#2c2a26; --sub:#8a8680; --accent:#8a9e82; --accent2:#6a7e64;
  --dark:#242220; --dark2:#1e1c1a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--bg);color:var(--text);}

.header{background:var(--dark);color:white;padding:20px 28px 0;border-bottom:2px solid var(--accent);}
.header-top{display:flex;align-items:baseline;gap:16px;margin-bottom:4px;}
.header-logo{font-size:18px;font-weight:300;letter-spacing:4px;text-transform:uppercase;}
.header-logo span{color:var(--accent);font-weight:700;}
.header-badge{font-size:10px;background:rgba(138,158,130,.2);color:var(--accent);border:1px solid rgba(138,158,130,.4);padding:2px 10px;border-radius:12px;letter-spacing:1px;}
.header-meta{font-size:11px;color:rgba(255,255,255,.35);padding:8px 0 12px;}

.audience-bar{background:#2e2b28;border-bottom:1px solid #3d3a35;padding:8px 28px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.audience-label{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;margin-right:4px;}
.audience-chip{background:rgba(138,158,130,.12);border:1px solid rgba(138,158,130,.28);color:var(--accent);font-size:11px;padding:3px 12px;border-radius:12px;}

.tabs-wrap{background:var(--dark2);border-bottom:1px solid #3d3a35;padding:0 28px;overflow-x:auto;display:flex;gap:2px;scrollbar-width:none;}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tab-btn{padding:12px 16px;font-size:12px;color:rgba(255,255,255,.45);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;letter-spacing:.5px;transition:all .2s;}
.tab-btn:hover{color:rgba(255,255,255,.75);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-count{background:rgba(138,158,130,.18);color:var(--accent);font-size:10px;padding:1px 6px;border-radius:10px;margin-left:5px;}

.content{padding:24px 28px;max-width:1200px;margin:0 auto;}
.page{display:none;}.page.active{display:block;}

.page-header{margin-bottom:20px;}
.page-title{font-size:15px;font-weight:300;letter-spacing:2px;margin-bottom:4px;}
.page-subtitle{font-size:12px;color:var(--sub);}

.summary-box{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:6px;padding:16px 20px;margin-bottom:20px;}
.summary-title{font-size:10px;letter-spacing:2px;color:var(--accent2);text-transform:uppercase;margin-bottom:8px;}
.summary-text{font-size:13px;line-height:1.9;}

.stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:14px 18px;flex:1;min-width:120px;}
.stat-lbl{font-size:10px;color:var(--sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.stat-val{font-size:22px;font-weight:300;}
.stat-val small{font-size:12px;color:var(--sub);font-weight:400;}

.posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px;}

.post-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;}
.post-card.hot{border-top:3px solid var(--accent);}

.pc-head{padding:14px 16px 10px;display:flex;gap:10px;align-items:flex-start;}
.avatar{width:38px;height:38px;background:var(--accent2);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;}
.pc-info{flex:1;min-width:0;}
.pc-author{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-date{font-size:11px;color:var(--sub);}
.kw-tag{display:inline-block;font-size:10px;background:rgba(138,158,130,.1);color:var(--accent2);border:1px solid rgba(138,158,130,.22);padding:1px 8px;border-radius:10px;margin-top:3px;}
.threads-link{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--sub);text-decoration:none;border:1px solid var(--border);padding:2px 9px;border-radius:10px;margin-top:4px;transition:all .15s;}
.threads-link:hover{color:var(--accent2);border-color:var(--accent);background:rgba(138,158,130,.06);}

.pc-text{padding:0 16px 8px;font-size:13px;line-height:1.75;max-height:120px;overflow:hidden;position:relative;transition:max-height .4s ease;}
.pc-text.expanded{max-height:2000px;overflow:visible;}
.pc-fade{position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(transparent,white);pointer-events:none;transition:opacity .3s;}
.pc-text.expanded .pc-fade{opacity:0;pointer-events:none;}
.expand-btn{display:flex;align-items:center;gap:4px;background:none;border:1px solid var(--border);border-radius:4px;color:var(--accent2);font-size:11px;cursor:pointer;padding:3px 12px 3px 16px;margin:0 16px 8px;transition:all .15s;}
.expand-btn:hover{background:rgba(138,158,130,.06);border-color:var(--accent);}

.pc-stats{padding:8px 16px;border-top:1px solid var(--border);display:flex;gap:14px;}
.pstat{font-size:12px;color:var(--sub);}
.pstat b{color:var(--text);}

.emo-row{padding:8px 16px;display:flex;gap:6px;flex-wrap:wrap;}
.emo-tag{font-size:11px;padding:2px 10px;border-radius:12px;}
.emo-anxiety{background:#f5eeee;color:#7a3c4a;}
.emo-achieve{background:#eef2ec;color:#3a5e3a;}
.emo-regret{background:#f5f2e8;color:#7a5e20;}
.emo-confused{background:#f0eef5;color:#4a3a70;}
.emo-rational{background:#eef2f5;color:#2a4a6a;}
.emo-critical{background:#f5eef0;color:#6a3a5a;}

.pain-section{padding:8px 16px 12px;}
.pain-row{margin-bottom:7px;}
.pain-lbl{font-size:10px;letter-spacing:1px;color:var(--sub);text-transform:uppercase;margin-bottom:2px;}
.pain-txt{font-size:12px;line-height:1.65;}

.cmts-section{border-top:1px solid var(--border);}
.cmts-header{padding:9px 16px 6px;background:#fafaf8;font-size:11px;color:var(--sub);font-weight:600;letter-spacing:.5px;display:flex;align-items:center;gap:6px;}
.cmts-header::before{content:'💬';}
.cmts-list{padding:4px 16px 10px;display:block;}
.cmt{padding:8px 0;border-bottom:1px solid #f0ede8;}
.cmt:last-child{border-bottom:none;}
.cmt-author{font-size:11px;font-weight:600;color:var(--sub);margin-bottom:2px;}
.cmt-text{font-size:12px;line-height:1.65;}
.cmt.divergent{background:#fffcf0;border-left:2px solid #e0b030;padding:6px 10px;border-radius:0 4px 4px 0;margin:4px 0;}

.strategy-section{border-top:1px solid var(--border);padding:12px 16px;background:#f9fdf8;}
.strategy-lbl{font-size:10px;letter-spacing:2px;color:var(--accent2);text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:8px;}
.strategy-lbl::before{content:'';display:inline-block;width:18px;height:1px;background:var(--accent);}
.strategy-txt{font-size:12px;line-height:1.75;}
.stag-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.stag{font-size:10px;background:rgba(138,158,130,.12);color:var(--accent2);padding:2px 8px;border-radius:10px;border:1px solid rgba(138,158,130,.22);}

.divergent-badge{display:inline-block;font-size:10px;background:#fff3cd;color:#8a6000;border:1px solid #f0d060;padding:1px 7px;border-radius:10px;margin-left:6px;}

/* Brand page */
.brand-section{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:22px;margin-bottom:20px;}
.brand-section-title{font-size:14px;font-weight:600;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.brand-section-title::before{content:'';display:inline-block;width:3px;height:18px;background:var(--accent);border-radius:2px;}
.persona-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;}
.persona-card{background:#fafaf8;border:1px solid var(--border);border-radius:8px;padding:16px;}
.persona-icon{font-size:28px;margin-bottom:10px;}
.persona-name{font-size:14px;font-weight:600;margin-bottom:6px;}
.persona-desc{font-size:12px;color:var(--sub);line-height:1.75;margin-bottom:10px;}
.persona-tags{display:flex;gap:5px;flex-wrap:wrap;}
.ptag{font-size:10px;background:rgba(138,158,130,.1);color:var(--accent2);padding:2px 9px;border-radius:10px;border:1px solid rgba(138,158,130,.22);}
.persona-pain{font-size:11px;color:#7a3c4a;background:#f5eeee;padding:5px 10px;border-radius:4px;margin-top:10px;line-height:1.6;}
.kw-cloud{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
.kw-pill{font-size:12px;padding:4px 16px;border-radius:20px;border:1px solid rgba(138,158,130,.3);color:var(--accent2);background:rgba(138,158,130,.08);}
.kw-pill.hot{background:var(--accent);color:white;border-color:var(--accent2);}
.content-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:14px;}
.content-table th{background:#f0ede8;padding:10px 14px;text-align:left;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--sub);font-weight:600;}
.content-table td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:top;line-height:1.7;}
.content-table tr:last-child td{border-bottom:none;}
.content-table tr:hover td{background:#fafaf8;}
.ct-persona{display:inline-block;font-size:10px;background:rgba(138,158,130,.1);color:var(--accent2);padding:1px 8px;border-radius:10px;border:1px solid rgba(138,158,130,.22);margin-right:4px;}

@media(max-width:768px){
  .posts-grid{grid-template-columns:1fr;}
  .persona-grid{grid-template-columns:1fr 1fr;}
  .content{padding:16px;}
  .tabs-wrap,.header,.audience-bar{padding-left:16px;padding-right:16px;}
}
</style>
</head>

function toggleTxt(id){
  const el=document.getElementById('txt'+id);
  const btn=document.getElementById('ebtn'+id);
  if(!el||!btn) return;
  const isExpanded=el.classList.contains('expanded');
  if(isExpanded){
    el.classList.remove('expanded');
    btn.innerHTML='▾ 展開全文';
    btn.style.borderColor='';
  } else {
    el.classList.add('expanded');
    btn.innerHTML='▴ 收合';
    btn.style.borderColor='var(--accent)';
  }
}

}

    </div>

}

function init(){
  const catCounts={};
  POSTS.forEach(p=>{catCounts[p.cat]=(catCounts[p.cat]||0)+1;});
  const tw=document.getElementById('tabsWrap');
  const ca=document.getElementById('contentArea');
  TABS.forEach((t,i)=>{
    const cnt=t.id==='all'?POSTS.length:t.id==='brand'?'':catCounts[t.id]||0;
    const btn=document.createElement('button');
    btn.className='tab-btn'+(i===0?' active':'');
    btn.innerHTML=t.label+(cnt!==''?`<span class="tab-count">${cnt}</span>`:'');
    btn.onclick=()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('pg-'+t.id).classList.add('active');
    };
    tw.appendChild(btn);
    const pg=document.createElement('div');
    pg.className='page'+(i===0?' active':'');
    pg.id='pg-'+t.id;
    pg.innerHTML=t.id==='brand'?renderBrand():renderPosts(t.id);
    ca.appendChild(pg);
  });
}
init();
</script>
</body>
</html>
